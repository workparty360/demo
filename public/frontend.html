<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <script>
        async function sum() {
            try {
                const resp = await axios.post("http://localhost:3000/multiply", {
                    a: document.querySelector("#num1").value,
                    b: document.querySelector("#num2").value
                });
                console.log(resp.data);
            } catch (error) {
                console.error("Request fail ho gayi:", error.message);
            }
        }
    </script>
</head>

<body>
    <input id="num1">
    <input id="num2">
    <button onclick="sum()">Multiply</button>
</body>
</html>
